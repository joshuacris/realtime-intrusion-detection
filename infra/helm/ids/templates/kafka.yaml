# Single-node Kafka (KRaft) for the cluster. One listener, advertised as the
# Service name `kafka:9092` so in-cluster clients (and KEDA) can reach it.
# Auto-creates topics with 3 partitions (so multiple inference consumers can
# scale out across partitions).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  labels: { app: kafka }
spec:
  replicas: 1
  selector:
    matchLabels: { app: kafka }
  template:
    metadata:
      labels: { app: kafka }
    spec:
      containers:
        - name: kafka
          image: {{ .Values.kafka.image }}
          ports:
            - containerPort: 9092
          env:
            - { name: KAFKA_NODE_ID,            value: "1" }
            - { name: KAFKA_PROCESS_ROLES,      value: "broker,controller" }
            # Single-node controller talks to ITSELF on localhost:9093. (Using the
            # Service name would route through the Service, which only exposes 9092,
            # so the controller channel would be refused and the broker would exit.)
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@localhost:9093" }
            - { name: KAFKA_LISTENERS,          value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093" }
            # Advertise the FQDN so clients in OTHER namespaces (e.g. KEDA in the
            # `keda` namespace) can resolve the broker after bootstrap. Bare
            # `kafka` only resolves within this namespace.
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka.default.svc.cluster.local:9092" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES,  value: "CONTROLLER" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "true" }
            - { name: KAFKA_NUM_PARTITIONS,     value: "3" }
            - { name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS, value: "0" }
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
spec:
  selector: { app: kafka }
  ports:
    - port: 9092
      targetPort: 9092