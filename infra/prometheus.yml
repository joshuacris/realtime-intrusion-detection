# Prometheus scrape config. Prometheus PULLS /metrics from each target.
# Our C++ services run on the HOST (not in Docker), so we reach them via
# host.docker.internal (Docker Desktop maps it to the host machine).
global:
  scrape_interval: 5s

scrape_configs:
  - job_name: feature_consumer
    static_configs:
      - targets: ["host.docker.internal:9102"]

  - job_name: inference_server
    static_configs:
      - targets: ["host.docker.internal:9103"]

  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]   # in the docker network