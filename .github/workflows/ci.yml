name: CI

# Run on pushes to main and on PRs.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # --- Validate the Helm chart renders/lints (fast, no build) ---
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: helm lint
        run: helm lint infra/helm/ids
      - name: helm template (render check)
        run: helm template ids infra/helm/ids > /dev/null

  # --- Compile the C++ for Linux (the Dockerfile "build" stage). ---
  # We target the build stage only: it compiles all binaries via vcpkg + ONNX
  # Runtime, WITHOUT the runtime stage's model COPY (the model + CSVs are
  # gitignored, so the full runtime image / ONNX parity test can't run in CI).
  cpp-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build C++ (Dockerfile build stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: build              # compile only; skip runtime/model COPY
          push: false
          cache-from: type=gha       # cache the slow vcpkg/deps build across runs
          cache-to: type=gha,mode=max

